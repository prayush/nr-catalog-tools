# Jekyll + just-the-docs configuration for the nrcats documentation site.
# Built and deployed by .github/workflows/docs.yml; see README.md for local builds.

title: nrcats
description: >-
  A stable, unified Python interface to NR binary black-hole waveform catalogs
  for LVK analyses, waveform modeling, and cross-catalog comparison.
url: https://gwnrtools.github.io
baseurl: /nrcats
repository: gwnrtools/nrcats

theme: just-the-docs

# Theme gems' own configs are not merged by Jekyll, so the default layout
# must be applied here for pages to be wrapped by the theme at all.
defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

# Convert relative links to .md files (used throughout the docs) into links
# to the rendered pages, so pages stay browsable both on GitHub and on the site.
relative_links:
  enabled: true
  collections: false

# ── just-the-docs options ────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

heading_anchors: true

aux_links:
  nrcats on GitHub: https://github.com/gwnrtools/nrcats
aux_links_new_tab: true

nav_enabled: true
back_to_top: true
back_to_top_text: Back to top

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Footer
footer_content: >-
  Copyright &copy; the nrcats developers.
  Distributed under the <a href="https://github.com/gwnrtools/nrcats/blob/master/LICENSE">GPL license</a>.

# ── kramdown ────────────────────────────────────────────────────────────────
# math_engine mathjax: kramdown extracts $$...$$ spans/blocks and emits
# \(...\) / \[...\] wrappers for client-side MathJax (loaded in
# _includes/head_custom.html).
kramdown:
  math_engine: mathjax
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - environment.yml
  - README.md
